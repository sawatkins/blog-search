<!DOCTYPE html>
<html lang="en">

<head>
    <title>{% block title %}Blog Search{% endblock %}</title>
    <meta http-equiv="Content-type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="sawatkins" />
    {% block robots %}<meta name="robots" content="index, follow">{% endblock %}
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600&family=Ubuntu:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- Prevent flash of wrong theme -->
    <script>
        let isDark = localStorage.getItem('dark-theme');
        if (isDark === null) {
            isDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        } else {
            isDark = isDark === 'true';
        }
        document.documentElement.classList.toggle('dark', isDark);
    </script>
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script defer src="https://umami.sawatkins.com/umami" data-website-id="a2446000-b7cd-480a-a4e9-4d777b8294d4"></script>

    <style>
        :root {
            --bg-primary: #f8fafc;
            --bg-secondary: #f1f5f9;
            --bg-input: #e2e8f0;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --border: #e2e8f0;
            --link-color: #3b82f6;
        }

        .dark {
            --bg-primary: #111827;
            --bg-secondary: #1f2937;
            --bg-input: #161b26;
            --text-primary: #f9fafb;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            --border: #374151;
            --link-color: #60a5fa;
        }

        * {
            box-sizing: border-box;
        }

        html {
            font-family: 'Ubuntu', system-ui, sans-serif;
        }

        body {
            font-size: 14px;
            color: var(--text-primary);
            background-color: var(--bg-primary);
            transition: background-color 0.15s ease, color 0.15s ease;
            line-height: 1.5;
        }

        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }

        .font-ubuntu {
            font-family: 'Ubuntu', sans-serif;
        }

        code, pre, .ascii-art {
            font-family: 'JetBrains Mono', monospace;
        }

        .ascii-art {
            white-space: pre;
            line-height: 1.2;
            font-size: 13px;
            color: var(--text-muted);
        }

        /* Search input styling */
        .search-input {
            background-color: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text-primary);
            transition: all 0.15s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        .search-input::placeholder {
            color: var(--text-muted);
        }

        /* Result link styling */
        .result-title {
            color: var(--link-color);
            transition: color 0.1s ease;
        }

        .result-title:hover {
            text-decoration: underline;
            text-underline-offset: 2px;
        }

        /* Code blocks */
        .code-block {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border);
        }

        /* Theme toggle */
        .theme-toggle {
            cursor: pointer;
            color: var(--text-muted);
            transition: color 0.1s ease;
        }

        .theme-toggle:hover {
            color: var(--text-primary);
        }

        /* Nav links */
        .nav-link {
            color: var(--text-muted);
            transition: color 0.1s ease;
        }

        .nav-link:hover {
            color: var(--text-primary);
        }

        /* Content link */
        .content-link {
            color: var(--link-color);
            transition: color 0.1s ease;
        }

        .content-link:hover {
            text-decoration: underline;
        }

        /* Quicklinks */
        .quicklink {
            color: #bf616a;
            transition: opacity 0.1s ease;
        }

        .quicklink:hover {
            opacity: 0.8;
            text-decoration: underline;
            text-underline-offset: 2px;
        }

        /* Pagination */
        .page-btn {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            transition: all 0.1s ease;
        }

        .page-btn:hover:not(.page-btn-disabled):not(.page-btn-active) {
            background-color: var(--bg-input);
            color: var(--text-primary);
        }

        .page-btn-active {
            background-color: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .page-btn-disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Scrollbar styling for dark mode */
        .dark ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        .dark ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }

        .dark ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        .dark ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }
    </style>
    {% block head_extra %}{% endblock %}
</head>

<body class="min-h-screen flex flex-col">
    <!-- Header -->
    <header class="border-b" style="border-color: var(--border); background-color: var(--bg-primary);">
        <div class="max-w-3xl mx-auto px-4 py-3">
            <div class="flex items-center justify-between">
                <!-- Logo -->
                <a href="/" class="flex items-center gap-2 nav-link hover:opacity-80">
                    <img src="/static/img/sailboat.svg" alt="sailboat" class="w-5 h-5">
                    <span class="font-mono text-sm font-medium" style="color: var(--text-primary);">blogsearch.io</span>
                </a>

                <!-- Nav -->
                <nav class="flex items-center gap-5">
                    <a href="/about" class="nav-link text-sm font-ubuntu">about</a>
                    <a href="https://tally.so/r/w4kNkN" target="_blank" class="nav-link text-sm font-ubuntu">add</a>
                    <button id="theme-toggle" class="theme-toggle p-1" aria-label="Toggle dark mode">
                        <!-- Sun icon (shown in dark mode) -->
                        <svg id="sun-icon" xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="4"></circle>
                            <path d="M12 2v2"></path>
                            <path d="M12 20v2"></path>
                            <path d="m4.93 4.93 1.41 1.41"></path>
                            <path d="m17.66 17.66 1.41 1.41"></path>
                            <path d="M2 12h2"></path>
                            <path d="M20 12h2"></path>
                            <path d="m6.34 17.66-1.41 1.41"></path>
                            <path d="m19.07 4.93-1.41 1.41"></path>
                        </svg>
                        <!-- Moon icon (shown in light mode) -->
                        <svg id="moon-icon" xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path>
                        </svg>
                    </button>
                </nav>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 max-w-3xl w-full mx-auto px-4 py-6">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="border-t mt-auto" style="border-color: var(--border); background-color: var(--bg-primary);">
        <div class="max-w-3xl mx-auto px-4 py-3">
            <div class="flex items-center justify-between text-xs font-mono" style="color: var(--text-muted);">
                <span>index: <span style="color: var(--text-secondary);">{{ posts_size|default('—') }}</span> posts</span>
                <div class="flex items-center gap-4">
                    <a href="/api" class="nav-link">api</a>
                    <a href="https://status.blogsearch.io" class="nav-link" target="_blank">status</a>
                </div>
            </div>
        </div>
    </footer>

    <script>
        const themeToggle = document.getElementById('theme-toggle');
        const sunIcon = document.getElementById('sun-icon');
        const moonIcon = document.getElementById('moon-icon');
        const htmlElement = document.documentElement;
        
        function setTheme(isDark) {
            if (isDark) {
                htmlElement.classList.add('dark');
                sunIcon.classList.remove('hidden');
                moonIcon.classList.add('hidden');
            } else {
                htmlElement.classList.remove('dark');
                sunIcon.classList.add('hidden');
                moonIcon.classList.remove('hidden');
            }
            localStorage.setItem('dark-theme', isDark ? 'true' : 'false');
        }
        
        function getPreferredTheme() {
            const storedTheme = localStorage.getItem('dark-theme');
            if (storedTheme !== null) {
                return storedTheme === 'true';
            }
            return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        }
        
        setTheme(getPreferredTheme());
        
        themeToggle.addEventListener('click', function() {
            setTheme(!htmlElement.classList.contains('dark'));
        });
        
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
            if (localStorage.getItem('dark-theme') === null) {
                setTheme(e.matches);
            }
        });
    </script>

    {% block scripts %}{% endblock %}
</body>

</html>
